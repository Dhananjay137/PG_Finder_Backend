<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, sans-serif;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" width="100%" style="max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <tr>
            <td style="padding: 40px 30px; text-align: center;">
                <h1 style="color: #333333; font-size: 24px; margin-bottom: 20px;">Reset Your Password</h1>
                <p style="color: #666666; font-size: 16px; line-height: 1.5; margin-bottom: 30px;">
                    We received a request to reset the password for your account. Click the button below to choose a new one.
                </p>
                <!-- Replace '{{resetLink}}' with your dynamic URL from the backend -->
                <a href="{{resetLink}}" style="background-color: #007bff; color: #ffffff; padding: 15px 25px; text-decoration: none; font-weight: bold; border-radius: 5px; display: inline-block;">
                    Reset Password
                </a>
                <p style="color: #999999; font-size: 14px; margin-top: 30px; line-height: 1.5;">
                    If you didn't request this, you can safely ignore this email. This link will expire in 60 minutes.
                </p>
            </td>
        </tr>
        <tr>
            <td style="background-color: #f8f9fa; padding: 20px; text-align: center; color: #999999; font-size: 12px;">
                © 2026 PG Finder. All rights reserved.
            </td>
        </tr>
    </table>
</body>
</html>
